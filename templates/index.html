<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <title>Lucky Spelling Test</title>
    <link rel="stylesheet" href="styles.css?v=pokemon-modes-20260718-1">
  </head>
  <body>
    <main class="app" aria-live="polite">
      <section id="intro-screen" class="screen intro-screen">
        <div class="pokemon-lineup" aria-label="Pikachu, Eevee, Bulbasaur, Charmander, and Squirtle">
          <img src="pokemon/bulbasaur.png?v=pokemon-modes-20260718-1" alt="Bulbasaur">
          <img src="pokemon/eevee.png?v=pokemon-modes-20260718-1" alt="Eevee">
          <img class="lineup-star" src="pokemon/pikachu.png?v=pokemon-modes-20260718-1" alt="Pikachu">
          <img src="pokemon/charmander.png?v=pokemon-modes-20260718-1" alt="Charmander">
          <img src="pokemon/squirtle.png?v=pokemon-modes-20260718-1" alt="Squirtle">
        </div>

        <header class="intro-header">
          <p class="eyebrow">Choose your adventure</p>
          <h1 id="intro-title">Lucky Spelling</h1>
          <p id="intro-topic" class="intro-topic">Listen, learn, and spell</p>
        </header>

        <div class="mode-grid" aria-label="Choose a mode">
          <button id="choose-learn" class="mode-card mode-learn" type="button">
            <span class="mode-icon" aria-hidden="true">📖</span>
            <span class="mode-copy">
              <strong>Learn</strong>
              <small>See the word and discover its meaning</small>
            </span>
          </button>
          <button id="choose-test" class="mode-card mode-test" type="button">
            <span class="mode-icon pokeball-icon" aria-hidden="true"></span>
            <span class="mode-copy">
              <strong>Test</strong>
              <small>Listen and spell without seeing the word</small>
            </span>
          </button>
        </div>
      </section>

      <section id="practice-screen" class="screen practice-screen is-hidden">
        <header class="practice-header">
          <button id="change-mode" class="quiet-button" type="button">← Modes</button>
          <p id="progress" class="progress">1 of 1</p>
        </header>

        <div class="practice-title">
          <div>
            <p id="mode-label" class="eyebrow">Learn mode</p>
            <h1 id="practice-heading">Learn the word</h1>
          </div>
          <img id="buddy-image" class="buddy-image" src="pokemon/pikachu.png?v=pokemon-modes-20260718-1" alt="Pikachu">
        </div>

        <div class="word-card">
          <p id="prompt" class="prompt">Look, listen, and say it</p>
          <p id="word" class="word"></p>
          <button id="repeat" class="listen-button" type="button">
            <span aria-hidden="true">🔊</span>
            <span>Hear the word</span>
          </button>
        </div>

        <button id="meaning" class="meaning-button" type="button">What does it mean?</button>

        <div class="navigation" aria-label="Word navigation">
          <button id="back" class="back-button" type="button">Back</button>
          <button id="next" class="next-button" type="button">Next</button>
        </div>
        <p id="status" class="status" role="status"></p>
      </section>

      <section id="finish-screen" class="screen finish-screen is-hidden">
        <img class="finish-pokemon" src="pokemon/jigglypuff.png?v=pokemon-modes-20260718-1" alt="Jigglypuff">
        <p class="eyebrow">Adventure complete</p>
        <h1>Great job, Lucky!</h1>
        <p id="finish-message" class="finish-message">You finished all the words.</p>
        <ol id="word-list" class="word-list"></ol>
        <div class="finish-actions">
          <button id="finish-restart" class="next-button" type="button">Do it again</button>
          <button id="finish-modes" class="quiet-button finish-modes" type="button">Choose another mode</button>
        </div>
      </section>

      <dialog id="learn-dialog" class="learn-dialog" aria-labelledby="learn-word">
        <div class="learn-card">
          <button id="close-learn" class="close-learn" type="button" aria-label="Close meaning card">×</button>
          <p class="eyebrow">Word meaning</p>
          <h2 id="learn-word"></h2>
          <img id="learn-image" class="learn-image" alt="">
          <p id="learn-definition" class="learn-definition"></p>
          <button id="play-definition" class="play-definition" type="button">🔊 Hear the meaning</button>
          <a id="image-credit" class="image-credit" href="https://openmoji.org/" target="_blank" rel="noopener"></a>
        </div>
      </dialog>
    </main>

    <footer class="legal-note">Pokémon images © Nintendo / Creatures / GAME FREAK.</footer>
    <script src="app.js?v=pokemon-modes-20260718-1"></script>
  </body>
</html>
